{% extends "base.html" %}

{% block title %}Whiteboard{% endblock %}

{% block head %}
    <!-- Alpine.js (local) -->
    <script defer src="/static/js/vendor/alpine.min.js"></script>
{% endblock %}

{% block body_attrs %}class="min-h-screen flex items-center justify-center p-4" style="background: #f5f5f0;"{% endblock %}

{% block body %}
    <!-- Background decorations -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-16 left-16 w-20 h-20 bg-red-500 opacity-90" style="transform: rotate(15deg);"></div>
        <div class="absolute top-24 right-32 w-14 h-14 bg-yellow-400 rounded-full opacity-90"></div>
        <div class="absolute bottom-24 left-32 w-16 h-16 border-4 border-black opacity-50" style="transform: rotate(-10deg);"></div>
        <div class="absolute bottom-20 right-24 w-10 h-28 bg-blue-500 opacity-80" style="transform: rotate(8deg);"></div>
        <svg class="absolute top-1/3 left-1/4 w-24 h-6 opacity-30" viewBox="0 0 100 15">
            <path d="M0,8 C20,2 40,14 60,8 S80,2 100,8" stroke="#1e1e1e" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
    </div>

    <div class="max-w-md w-full relative" x-data="{ 
        t(key) { return i18n.t(key); }
    }" x-init="document.title = t('appName')">
        <div class="bg-white shadow-2xl" style="border: 3px solid #1e1e1e; transform: rotate(-0.5deg);">
            <!-- Top accent bar -->
            <div class="h-2 bg-red-500"></div>
            
            <div class="p-8">
                <!-- Logo/Icon -->
                <div class="flex items-start gap-4 mb-6">
                    <div class="w-14 h-14 bg-yellow-400 flex items-center justify-center flex-shrink-0" style="border: 2px solid #1e1e1e; transform: rotate(3deg);">
                        <svg class="w-7 h-7 text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black text-gray-900 tracking-tight leading-tight" x-html="t('landing.title').replace(' ', '<br>')"></h1>
                    </div>
                </div>

                <p class="text-gray-600 text-sm uppercase tracking-widest font-medium mb-8" x-text="t('landing.subtitle')"></p>

                <!-- Info Cards -->
                <div class="space-y-3 mb-8">
                    <div class="flex items-start gap-3 p-3 border-2 border-gray-900" style="transform: rotate(0.3deg);">
                        <div class="w-8 h-8 bg-emerald-500 flex items-center justify-center flex-shrink-0" style="border: 2px solid #1e1e1e;">
                            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-900 text-sm uppercase tracking-wide" x-text="t('landing.feature1Title')"></h3>
                            <p class="text-xs text-gray-500" x-text="t('landing.feature1Desc')"></p>
                        </div>
                    </div>
                    
                    <div class="flex items-start gap-3 p-3 border-2 border-gray-900" style="transform: rotate(-0.5deg);">
                        <div class="w-8 h-8 bg-blue-500 flex items-center justify-center flex-shrink-0" style="border: 2px solid #1e1e1e;">
                            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-900 text-sm uppercase tracking-wide" x-text="t('landing.feature2Title')"></h3>
                            <p class="text-xs text-gray-500" x-text="t('landing.feature2Desc')"></p>
                        </div>
                    </div>
                    
                    <div class="flex items-start gap-3 p-3 border-2 border-gray-900" style="transform: rotate(0.4deg);">
                        <div class="w-8 h-8 bg-gray-900 flex items-center justify-center flex-shrink-0">
                            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-900 text-sm uppercase tracking-wide" x-text="t('landing.feature3Title')"></h3>
                            <p class="text-xs text-gray-500" x-text="t('landing.feature3Desc')"></p>
                        </div>
                    </div>
                </div>

                <!-- CTA -->
                <div class="border-2 border-gray-900 p-4" style="background: #fef9c3; transform: rotate(-0.3deg);">
                    <p class="text-sm text-gray-900 font-bold uppercase tracking-wide mb-1" x-text="t('landing.needBoard')"></p>
                    <p class="text-xs text-gray-700" x-text="t('landing.contactAdmin')"></p>
                </div>
            </div>

            <!-- Bottom accent bar -->
            <div class="flex">
                <div class="flex-1 h-2 bg-blue-500"></div>
                <div class="flex-1 h-2 bg-yellow-400"></div>
                <div class="flex-1 h-2 bg-gray-900"></div>
            </div>
        </div>

        <!-- API Documentation Link -->
        <a href="/docs" class="block mt-4 text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 bg-white border-2 border-gray-900 text-gray-900 text-xs font-bold uppercase tracking-wide hover:bg-gray-100 transition-colors" style="transform: rotate(0.5deg);">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <span x-text="t('landing.apiDocs')">API Documentation</span>
            </div>
        </a>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-500 mt-6 font-medium" x-text="t('landing.footer')"></p>
    </div>
{% endblock %}

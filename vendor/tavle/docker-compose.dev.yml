# Local debug: Flask development server (port 5050) instead of gunicorn.
# Usage from this directory:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Not suitable for production (no multi-worker, verbose errors).

services:
  app:
    command: ["python", "server.py"]
    environment:
      FLASK_ENV: development
      LOG_LEVEL: DEBUG

# =============================================================================
# Collaborative Whiteboard - Docker Compose Configuration
# =============================================================================
#
# Production-style run (gunicorn + eventlet):  docker compose up --build
# Flask debug on 5050 (like local ``python server.py``):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
services:
  # ===========================================================================
  # Whiteboard Application
  # ===========================================================================
  app:
    build:
      context: ..
      dockerfile: tavle/Dockerfile
    container_name: whiteboard-app
    restart: unless-stopped
    ports:
      - "${PORT:-5050}:5050"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - DATABASE_URL=postgresql://whiteboard:${POSTGRES_PASSWORD:-whiteboard}@db:5432/whiteboard
      - DB_MAX_CONNECTIONS=${DB_MAX_CONNECTIONS:-32}
      - DB_STALE_TIMEOUT=${DB_STALE_TIMEOUT:-300}
      - DB_TIMEOUT=${DB_TIMEOUT:-30}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TAVLE_EXTRA_STYLESHEETS=${TAVLE_EXTRA_STYLESHEETS:-}
      - TAVLE_EMBED_FRAME_ANCESTORS=${TAVLE_EMBED_FRAME_ANCESTORS:-}
      # SECRET_KEY is auto-generated and stored in database on first run.
      # Only set this if you need a consistent key across multiple instances.
      # - SECRET_KEY=${SECRET_KEY}
    volumes:
      - app-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - whiteboard-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  db:
    image: postgres:16-alpine
    container_name: whiteboard-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=whiteboard
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-whiteboard}
      - POSTGRES_DB=whiteboard
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - whiteboard-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whiteboard -d whiteboard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Uncomment to expose PostgreSQL port for debugging
    # ports:
    #   - "5432:5432"

  # ===========================================================================
  # Traefik Reverse Proxy (Optional - for production)
  # ===========================================================================
  # Uncomment this section to enable Traefik
  # traefik:
  #   image: traefik:v3.0
  #   container_name: whiteboard-traefik
  #   restart: unless-stopped
  #   command:
  #     - "--api.dashboard=false"
  #     - "--providers.docker=true"
  #     - "--providers.docker.exposedbydefault=false"
  #     - "--entrypoints.web.address=:80"
  #     # Uncomment for HTTPS (requires cert configuration)
  #     # - "--entrypoints.websecure.address=:443"
  #   ports:
  #     - "80:80"
  #     # - "443:443"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   networks:
  #     - whiteboard-network

# =============================================================================
# Networks
# =============================================================================
networks:
  whiteboard-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    driver: local
  app-logs:
    driver: local

# Tavle App — web portal + Tavle whiteboard
#
#   docker compose up --build
#
# Open http://localhost:8080 (portal) and http://localhost:5050 (Tavle direct)
#
services:
  tavle-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: whiteboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whiteboard}
      POSTGRES_DB: whiteboard
    volumes:
      - tavle-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whiteboard -d whiteboard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tavle-net

  tavle:
    build:
      context: .
      dockerfile: docker/tavle.Dockerfile
    restart: unless-stopped
    ports:
      - "${TAVLE_PORT:-5050}:5050"
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      DATABASE_URL: postgresql://whiteboard:${POSTGRES_PASSWORD:-whiteboard}@tavle-db:5432/whiteboard
      TAVLE_EMBED_FRAME_ANCESTORS: ${TAVLE_EMBED_FRAME_ANCESTORS:-http://localhost:8080,http://127.0.0.1:8080}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      tavle-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 25s
    networks:
      - tavle-net

  portal:
    build:
      context: .
      dockerfile: docker/portal.Dockerfile
    restart: unless-stopped
    ports:
      - "${PORTAL_PORT:-8080}:8080"
    environment:
      TAVLE_INTERNAL_URL: http://tavle:5050
      TAVLE_PUBLIC_URL: ${TAVLE_PUBLIC_URL:-http://localhost:5050}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      METADATA_DB_PATH: /data/metadata.db
      STATIC_DIR: /app/static
    volumes:
      - portal-data:/data
    depends_on:
      tavle:
        condition: service_healthy
    networks:
      - tavle-net

networks:
  tavle-net:
    driver: bridge

volumes:
  tavle-postgres:
  portal-data:
